# ---- Server ----
server.port=8090
# allow long TTS text in the GET query string (Bangla URL-encodes to ~9 bytes/char)
server.max-http-request-header-size=65536

# ---- MySQL (local) ----
spring.datasource.url=jdbc:mysql://localhost:3306/dse_oms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Dhaka
spring.datasource.username=root
spring.datasource.password=gulshan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
# schema is owned by db/schema.sql + seed.sql; Hibernate never alters it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.show-sql=false

# ---- Throughput harness (Exchange Connectivity → Throughput Test) ----
# Places real orders at a chosen rate to measure orders/sec on THIS deployment. It is an order
# flood trigger and the API has no auth layer, so switch it OFF outside development:
#   LOADTEST_ENABLED=false
app.loadtest.enabled=${LOADTEST_ENABLED:true}

# Order placement holds a DB connection for its whole transaction, so this pool size is a hard
# ceiling on concurrent orders — raise it on a real server (it is reported in the harness results).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# ---- Market depth: pushed, not polled ----
# The terminal registers interest in an instrument and the backend pushes its book on the SSE stream
# whenever it changes. Nothing is computed or sent for a book nobody is looking at, and a book that
# has not moved is not re-sent. Raise push-ms to trade freshness for load.
app.depth.push-ms=${DEPTH_PUSH_MS:400}
app.depth.watch-ttl-ms=${DEPTH_WATCH_TTL_MS:45000}

# ---- Board rules ----
# DSE's block-market floor. Below this, a trade belongs in the public market — and sending it to the
# block market is how a broker gets a letter from the exchange.
rms.block-min-value=${RMS_BLOCK_MIN_VALUE:500000}

# Bond Reference Price Limit (DSE Bond BRS 1.1.6): a bond limit order whose CLEAN price is more than
# this % away from the reference (yesterday's close) is rejected — the bond circuit breaker. Yield
# orders are converted to clean price first, so a fat-fingered yield is caught the same way.
rms.bond-price-band-pct=${RMS_BOND_PRICE_BAND_PCT:10}

# ---- Market-data plane (MySQL stays the system of record; these hold only what it can rebuild) ----
# QuestDB — the tick time-series: every trade print, kept, and the source of every candle.
# Without it the tick is published to the browser and thrown away, and the chart falls back to a
# synthetic random walk. Start it with start-questdb.bat.
tickstore.enabled=${TICKSTORE_ENABLED:true}
tickstore.host=${TICKSTORE_HOST:127.0.0.1}
tickstore.ilp-port=${TICKSTORE_ILP_PORT:9009}
tickstore.http-port=${TICKSTORE_HTTP_PORT:9000}

# Valkey (Redis / Memurai on Windows) — the live picture: quotes, depth ladders, cross-instance
# fan-out. Degrades to MySQL + the in-JVM book if it is not reachable; trading is never affected.
hotstore.enabled=${HOTSTORE_ENABLED:true}
hotstore.host=${HOTSTORE_HOST:127.0.0.1}
hotstore.port=${HOTSTORE_PORT:6379}

# ---- AI embedding (semantic security search) ----
app.embedding.cache-file=./oms-embeddings-cache.bin
app.embedding.warm-on-startup=true

# ---- Matching engine simulator ----
# how often (ms) the simulator injects synthetic liquidity & sweeps stop orders
app.matching.tick-ms=1500
# enable the background scheduler (synthetic depth for fills + index animation)
app.matching.autosim=true
# false → real prices come from the live Python/dsebd.org feed; simulator won't drift stock prices
app.matching.price-sim=false

# ---- AI Advisor (Gemini) ----
# The API key lives in secrets.properties (gitignored, NOT committed) and/or the
# GEMINI_API_KEY environment variable. Without either, the advisor uses its
# OMS-grounded rule-based fallback. secrets.properties (imported below) wins.
spring.config.import=optional:file:./secrets.properties
app.ai.gemini.key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# ---- CORS (Next.js dev server) ----
app.cors.allowed-origins=http://localhost:3060,http://127.0.0.1:3060,http://localhost:3000

logging.level.com.naztech=INFO
