# ---- Server ----
server.port=8090
# allow long TTS text in the GET query string (Bangla URL-encodes to ~9 bytes/char)
server.max-http-request-header-size=65536

# ---- MySQL (local) ----
spring.datasource.url=jdbc:mysql://localhost:3306/dse_oms?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Dhaka
spring.datasource.username=root
spring.datasource.password=gulshan
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ---- JPA ----
# schema is owned by db/schema.sql + seed.sql; Hibernate never alters it
spring.jpa.hibernate.ddl-auto=none
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.batch_size=100
spring.jpa.show-sql=false

# ---- Throughput harness (Exchange Connectivity → Throughput Test) ----
# Places real orders at a chosen rate to measure orders/sec on THIS deployment. It is an order
# flood trigger and the API has no auth layer, so switch it OFF outside development:
#   LOADTEST_ENABLED=false
app.loadtest.enabled=${LOADTEST_ENABLED:true}

# Order placement holds a DB connection for its whole transaction, so this pool size is a hard
# ceiling on concurrent orders — raise it on a real server (it is reported in the harness results).
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# ---- AI embedding (semantic security search) ----
app.embedding.cache-file=./oms-embeddings-cache.bin
app.embedding.warm-on-startup=true

# ---- Matching engine simulator ----
# how often (ms) the simulator injects synthetic liquidity & sweeps stop orders
app.matching.tick-ms=1500
# enable the background scheduler (synthetic depth for fills + index animation)
app.matching.autosim=true
# false → real prices come from the live Python/dsebd.org feed; simulator won't drift stock prices
app.matching.price-sim=false

# ---- AI Advisor (Gemini) ----
# The API key lives in secrets.properties (gitignored, NOT committed) and/or the
# GEMINI_API_KEY environment variable. Without either, the advisor uses its
# OMS-grounded rule-based fallback. secrets.properties (imported below) wins.
spring.config.import=optional:file:./secrets.properties
app.ai.gemini.key=${GEMINI_API_KEY:}
app.ai.gemini.model=${GEMINI_MODEL:gemini-2.5-flash}

# ---- CORS (Next.js dev server) ----
app.cors.allowed-origins=http://localhost:3060,http://127.0.0.1:3060,http://localhost:3000

logging.level.com.naztech=INFO
