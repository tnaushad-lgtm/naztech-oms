# ============================================================================
#  secrets.sample.properties  —  TEMPLATE (safe to commit; contains no secrets)
#
#  SETUP:  copy this file to  secrets.properties  (same folder) and fill in real
#  values.  secrets.properties is gitignored and MUST NEVER be committed.
#  It is layered on top of application.yml at startup.
# ============================================================================

# ---- On-prem AI advisor + multilingual (EN/বাংলা) voice order parsing ----
# Google Gemini API key.  Leave BLANK to run without cloud AI — the OMS still
# works: it falls back to the in-JVM MiniLM semantic search and the deterministic
# regex order parser (English).  Fill it in to enable the AI Advisor and the
# multilingual voice → validated-command feature.
app.ai.gemini.key=
app.ai.gemini.model=gemini-2.5-flash

# ---- OpenAI / ChatGPT (optional second AI provider + LIVE VOICE) ----
# Fill this in to get two things:
#   1. a "ChatGPT" option next to "Gemini" in the AI Advisor — same live OMS context,
#      a different model answering;
#   2. LIVE VOICE — true speech-to-speech (OpenAI Realtime). Not the OMS's existing
#      voice feature, which transcribes, thinks, then reads an answer aloud. This one
#      hears you and speaks back, and you can interrupt it mid-sentence.
#
# The browser NEVER receives this key. The backend exchanges it for a ten-minute
# ephemeral token (ek_...) scoped to a single session, and only that reaches the page.
#
# COST: realtime audio is billed per second of speech. gpt-realtime-2.1-mini is ~3x
# cheaper than the full model ($10/$20 per 1M audio tokens vs $32/$64) and is the right
# default for testing. A live call is not free to leave open — the UI ends the session
# when the drawer closes, deliberately.
app.ai.openai.key=
app.ai.openai.model=gpt-5.6-luna
app.ai.openai.realtime-model=gpt-realtime-2.1-mini
# alloy | ash | ballad | coral | echo | sage | shimmer | verse | marin | cedar
app.ai.openai.voice=marin

# ---- Database (local dev convention) ----
# The app defaults to MySQL  dse_oms  with  root / gulshan .  Create the schema
# from  dse-oms/db/*.sql .  Uncomment + change only if your local MySQL differs.
# spring.datasource.url=jdbc:mysql://localhost:3306/dse_oms
# spring.datasource.username=root
# spring.datasource.password=gulshan

# ---- FIX / FIXSIM connectivity (optional — for order routing over FIX) ----
# Default is the local simulator (exchange.mode=simulator): orders match in-house.
# To route orders over FIX to your OWN FIXSIM session, set exchange.mode=dse-cert
# (e.g. via connect-dse-sim.bat) and fill these in.  CompIDs are REVERSED from
# FIXSIM's view: sender-comp-id = your session name, target-comp-id = FIXSIMDEMO.
# fix.enabled=true
# fix.host=<your FIXSIM host>
# fix.port=<your FIXSIM port>
# fix.sender-comp-id=<your FIXSIM session name>
# fix.target-comp-id=FIXSIMDEMO
